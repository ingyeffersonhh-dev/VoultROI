project: dolares
stack:
  framework: react
  build_tool: vite
  styling: tailwindcss
  language: typescript
  deployment: vercel
  testing:
    runner: vitest
    layers:
      - unit
      - component
    coverage: v8
    linter: eslint
    type_checker: tsc
    formatter: prettier
strict_tdd: true
persistence:
  mode: openspec
  artifact_root: openspec
  engram: false
pr_strategy: ask-on-risk
review_budget: 400
execution_mode: interactive
